<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - RentEase</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <main class="auth-wrapper">
        <form id="register-form" class="auth-card" onsubmit="handleRegister(event)">
            <div class="logo-link" style="text-align:center; display:block; margin-bottom:20px;">RentEase</div>
            <h2 style="margin-bottom:20px; text-align:center;">Criar conta</h2>

            <div class="edit-grid">
                <div class="input-group">
                    <label>Primeiro Nome</label>
                    <input type="text" id="firstName" required minlength="2">
                </div>
                <div class="input-group">
                    <label>Último Nome</label>
                    <input type="text" id="lastName" required minlength="2">
                </div>
            </div>

            <div class="input-group">
                <label for="reg-email">E-mail</label>
                <input type="email" id="reg-email" placeholder="exemplo@email.com" required>
            </div>

            <div class="input-group">
                <label for="birthDate">Data de Nascimento</label>
                <input type="date" id="birthDate" required>
            </div>

            <div class="input-group">
                <label for="reg-password">Palavra-passe</label>
                <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirmar Palavra-passe</label>
                <input type="password" id="confirm-password" placeholder="Repita a senha" required>
            </div>

            <button type="submit" class="btn-primary" style="margin-top:10px;">Registrar</button>
            
            <p style="text-align:center; margin-top:20px; font-size:14px;">
                Já tem conta? <a href="login.html" style="color:#ff385c; text-decoration:none; font-weight:bold;">Faça Login</a>
            </p>
        </form>
    </main>

    <script src="auth.js"></script>
    <script>
        function handleRegister(event) {
            event.preventDefault();

            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirmPass = document.getElementById('confirm-password').value;
            
            if (password !== confirmPass) {
                return alert("As passwords não coincidem!");
            }

            const users = JSON.parse(localStorage.getItem('users')) || [];
            if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) {
                return alert("Este email já está registado!");
            }

            const newUser = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                email: email,
                password: password,
                birthDate: document.getElementById('birthDate').value,
                favorites: [] 
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));

            alert("Conta criada com sucesso!");
            window.location.replace('login.html');
        }
    </script>
</body>
</html>
