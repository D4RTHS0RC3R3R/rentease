<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - RentEase</title>
    <link rel="stylesheet" href="styles.css"> </head>
<body class="auth-page">
    <main class="auth-container">
        <form id="register-form" class="airbnb-card">
            <div class="logo">RentEase</div>
            <h2>Criar conta</h2>
            
            <div class="input-group">
                <input type="text" id="firstName" placeholder="Primeiro Nome" required minlength="2"> 
                <input type="text" id="lastName" placeholder="Último Nome" required minlength="2"> 
            </div>
            
            <input type="email" id="reg-email" placeholder="E-mail" required> 
            <label for="birthDate">Data de Nascimento:</label>
            <input type="date" id="birthDate" required>
            
            <input type="password" id="reg-password" placeholder="Palavra-passe" required>
            <input type="password" id="confirm-password" placeholder="Confirmar Palavra-passe" required> 
            
            <button type="submit" class="btn-primary">Registar</button> 
            <p class="auth-footer">Já tem conta? <a href="login.html">Login</a></p>
        </form>
    </main>

    <script src="auth.js"></script> <script>
        document.getElementById('register-form').onsubmit = (e) => {
            e.preventDefault();
            const user = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('reg-email').value,
                birthDate: document.getElementById('birthDate').value,
                password: document.getElementById('reg-password').value
            };

            if (!validateUser(user)) return; 
            
            if (user.password !== document.getElementById('confirm-password').value) {
                return alert("As passwords não coincidem");
            }

            localStorage.setItem('user', JSON.stringify(user)); 
            createSession();
            window.location.href = 'index.html'; 
        };
    </script>
</body>
</html>
