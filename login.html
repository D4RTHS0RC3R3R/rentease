<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RentEase</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="logo-link">RentEase</h1>
                <h2>Bem-vindo de volta</h2>

            </div>

            <form id="login-form">
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="login-email" placeholder="exemplo@email.com" required>
                </div>

                <div class="input-group">
                    <label>Palavra-passe</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <div class="auth-footer">
                <p>Não tem conta? <a href="register.html">Registre-se aqui</a></p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;

            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.email === email && u.password === pass);

            if (user) {
                createSession(user);
                window.location.href = 'index.html';
            } else {
                alert("E-mail ou password incorretos.");
            }
        };
    </script>
</body>

</html>
