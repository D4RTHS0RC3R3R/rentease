<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Login - RentEase</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page">
    <main class="auth-wrapper">
        <div class="auth-card">
            <h1 style="text-align:center; color:var(--primary); margin-bottom:20px;">RentEase</h1>
            <h2 style="margin-bottom:20px; text-align:center; font-size: 18px;">Seja bem-vindo ao RentEase!</h2>

            <form id="login-form">
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="input-group">
                    <label>Palavra-passe</label>
                    <input type="password" id="login-pass" required>
                </div>
                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="forgot-password.html"
                        style="font-size: 13px; color:var(--text-light); text-decoration:none;">Esqueceu-se da
                        senha?</a>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <p style="text-align:center; margin-top:20px; font-size:14px;">
                Não tem conta? <a href="register.html"
                    style="color:var(--primary); text-decoration:none; font-weight:bold;">Registre-se</a>
            </p>
        </div>
    </main>

    <script>

        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const pass = document.getElementById('login-pass').value;

            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.email.toLowerCase() === email && u.password === pass);

            if (user) {
                localStorage.setItem('user', JSON.stringify(user));
                window.location.replace('index.html');
            } else {
                alert("E-mail ou palavra-passe incorretos!");
            }
        });
    </script>
</body>

</html>
