<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - RentEase</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="main-header">
        <div class="container header-flex">
            <a href="index.html" class="logo-link">RentEase</a>
            <nav class="main-nav">
                <a href="index.html">Favoritos</a>
                <a href="all-flats.html">Todos os Flats</a>
                <a href="new-flat.html">Novo Flat</a>
                <a href="profile.html" class="active">Perfil</a>
            </nav>
            <div class="user-info">
                Olá, <strong id="full-name-header">...</strong>
                <button onclick="logout()"
                    style="background:none; border:1px solid #ddd; padding:5px 12px; border-radius:20px; cursor:pointer;">Sair</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div style="max-width: 600px; margin: 0 auto;">
            <h1>O meu Perfil</h1>
            <span class="subtitle">Gere as tuas informações e conta.</span>

            <div class="airbnb-card" style="padding: 30px; border: 1px solid #ddd; border-radius: 12px;">
                <label>Nome Completo</label>
                <p id="profile-name" style="font-size: 1.2rem; font-weight: 600; margin-bottom: 15px;">-</p>

                <label>E-mail</label>
                <p id="profile-email" style="font-size: 1.1rem; margin-bottom: 15px;">-</p>

                <label>Data de Nascimento</label>
                <p id="profile-birth" style="font-size: 1.1rem; margin-bottom: 30px;">-</p>

                <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 30px;">

                <h3 style="color: #d32f2f; margin-bottom: 10px;">Excluir Conta</h3>
                <p class="subtitle" style="margin-bottom: 15px;">Ao excluir o seu perfil, todos os seus apartamentos e
                    dados serão removidos permanentemente.</p>

                <button onclick="deleteAccount()" class="btn-delete" style="padding: 15px;">Excluir Minha Conta</button>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script src="profile.js"></script>
</body>

</html>
