<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - RentEase</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-flex">
            <div class="logo">RentEase</div>
            <nav class="main-nav">
                <a href="index.html">Home (Favoritos)</a>
                <a href="all-flats.html">Todos os Flats</a>
                <a href="new-flat.html">Novo Flat</a>
                <a href="profile.html" class="active">Perfil</a>
            </nav>
            <div class="user-info">
                <span id="user-display">Olá, <strong id="full-name-header">...</strong></span>
                <button onclick="logout()" class="btn-logout">Sair</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="form-container airbnb-card">
            <h1>Definições de Perfil</h1>
            <p class="subtitle">Atualize as suas informações pessoais aqui.</p>

            <form id="update-profile-form">
                <div class="input-section">
                    <label>Dados Pessoais</label>
                    <div class="input-row">
                        <input type="text" id="edit-firstName" placeholder="Nome" required minlength="2">
                        <input type="text" id="edit-lastName" placeholder="Apelido" required minlength="2">
                    </div>
                    <input type="email" id="edit-email" placeholder="E-mail" required>
                    <input type="date" id="edit-birthDate" required>
                </div>

                <div class="input-section">
                    <label>Segurança</label>
                    <input type="password" id="edit-password" placeholder="Nova Palavra-passe">
                    <input type="password" id="edit-confirm-password" placeholder="Confirmar Nova Palavra-passe">
                </div>

                <button type="submit" class="btn-primary">Atualizar Perfil</button>
            </form>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                document.getElementById('edit-firstName').value = user.firstName;
                document.getElementById('edit-lastName').value = user.lastName;
                document.getElementById('edit-email').value = user.email;
                document.getElementById('edit-birthDate').value = user.birthDate;
                document.getElementById('full-name-header').textContent = `${user.firstName} ${user.lastName}`;
            }
        });

        document.getElementById('update-profile-form').onsubmit = (e) => {
            e.preventDefault();
            const currentUser = JSON.parse(localStorage.getItem('user'));
            
            const updatedUser = {
                firstName: document.getElementById('edit-firstName').value,
                lastName: document.getElementById('edit-lastName').value,
                email: document.getElementById('edit-email').value,
                birthDate: document.getElementById('edit-birthDate').value,
                password: document.getElementById('edit-password').value || currentUser.password
            };

            if (!validateUser(updatedUser)) return;
  
            const newPass = document.getElementById('edit-password').value;
            if (newPass && newPass !== document.getElementById('edit-confirm-password').value) {
                return alert("As novas passwords não coincidem!");
            }

             localStorage.setItem('user', JSON.stringify(updatedUser));
            alert("Perfil atualizado com sucesso!");
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
