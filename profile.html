<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - RentEase</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="main-header">
        <div class="container header-flex">
            <a href="index.html" class="logo-link">RentEase</a>
            <nav class="main-nav">
                <a href="index.html">Favoritos</a>
                <a href="all-flats.html">Todos os Flats</a>
                <a href="new-flat.html">Novo Flat</a>
                <a href="profile.html" class="active">Perfil</a>
            </nav>
            <div class="user-info">
                Olá, <strong id="full-name-header">...</strong>
                <button onclick="logout()" class="btn-logout">Sair</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div style="max-width: 600px; margin: 0 auto;">
            <h1>O meu Perfil</h1>
            <p class="subtitle">Edite as suas informações de conta abaixo.</p>

            <div class="auth-card" style="margin-top: 0;">
                <form id="profile-form" onsubmit="saveProfile(event)">
                    <div class="input-row">
                        <div>
                            <label>Primeiro Nome</label>
                            <input type="text" id="prof-firstName" required>
                        </div>
                        <div>
                            <label>Último Nome</label>
                            <input type="text" id="prof-lastName" required>
                        </div>
                    </div>

                    <label>E-mail (Não pode ser alterado)</label>
                    <input type="email" id="prof-email" disabled style="background: #f0f0f0; cursor: not-allowed;">

                    <label>Data de Nascimento</label>
                    <input type="date" id="prof-birth" required>

                    <button type="submit" class="btn-primary">Guardar Alterações</button>
                </form>

                <div style="border-top: 1px solid var(--border-color); padding-top: 30px; margin-top: 30px;">
                    <h3 style="color: var(--primary-color); margin-bottom: 8px;">Excluir Conta</h3>
                    <p class="subtitle" style="margin-bottom: 20px; font-size: 0.85rem;">Ao excluir a conta, todos os
                        seus dados serão eliminados permanentemente.</p>
                    <button onclick="deleteAccount()" class="btn-delete-acc">Excluir Minha Conta</button>
                </div>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script src="profile.js"></script>
</body>

</html>
