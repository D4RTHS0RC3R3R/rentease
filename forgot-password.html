<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <main class="auth-wrapper">
        <div class="auth-card">
            <h2 style="margin-bottom:10px;">Recuperar Senha</h2>
            <p style="margin-bottom: 25px; font-size: 14px; color: var(--text-light);">Introduza o seu e-mail para recuperar o acesso.</p>
            
            <form id="forgot-form" onsubmit="handleForgot(event)">
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="forgot-email" required>
                </div>
                <button type="submit" class="btn-primary">Ver Minha Senha</button>
            </form>
            
            <div style="text-align:center; margin-top: 20px;">
                <a href="login.html" style="text-decoration: none; color: var(--text-main); font-size: 14px;">← Voltar ao login</a>
            </div>
        </div>
    </main>
</body>
    <script>
        function handleForgot(e) {
            e.preventDefault();
            const email = document.getElementById('forgot-email').value.trim().toLowerCase();
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.email.toLowerCase() === email);
            if (user) {
                alert("A sua senha é: " + user.password);
                window.location.href = 'login.html';
            } else {
                alert("Utilizador não encontrado.");
            }
        }
    </script>
</body>
</html>
