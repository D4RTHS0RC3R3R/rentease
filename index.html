<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>RentEase - Favoritos</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="main-header">
        <div class="container header-flex">
            <a href="index.html" class="logo-link">RentEase</a>
            <nav class="main-nav">
                <a href="index.html" class="active">Favoritos</a>
                <a href="all-flats.html">Todos os Flats</a>
                <a href="new-flat.html">Novo Flat</a>
                <a href="profile.html">Perfil</a>
            </nav>
            <div class="user-info">Olá, <strong id="full-name-header">...</strong> 
                <button onclick="logout()" class="btn-logout">Sair</button>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: 40px;">
        <h1 style="margin-bottom: 10px;">Os meus Favoritos</h1>
        <p style="color: gray; margin-bottom: 30px;">Gerencie aqui os imóveis que guardou como favoritos.</p>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Cidade</th>
                        <th>Endereço</th>
                        <th>Área</th>
                        <th>AC</th>
                        <th>Disponível</th>
                        <th>Preço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="favorites-grid">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="viewModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeViewModal()">Fechar</span>
            <div id="view-details-content"></div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', renderFavorites);

    function renderFavorites() {
        const container = document.getElementById('favorites-grid');
        if (!container) return;

        const user = JSON.parse(localStorage.getItem('user')) || {};
        const flats = JSON.parse(localStorage.getItem('flats')) || [];
        const favIds = user.favorites || [];

        const myFavs = flats.filter(f => f && favIds.includes(f.id));

        if (myFavs.length === 0) {
            container.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px; color:gray;">Ainda não tens imóveis favoritos.</td></tr>';
            return;
        }

        const defaultImg = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='45' viewBox='0 0 60 45'><rect width='60' height='45' fill='%23eee'/><text x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='10' fill='%23999'>Casa</text></svg>`;

        container.innerHTML = myFavs.map(f => {
            const displayPhoto = f.photoUrl && f.photoUrl.trim() !== "" ? f.photoUrl : defaultImg;

            return `
                <tr onclick="viewFlatDetails('${f.id}')" style="cursor:pointer;">
                    <td>
                        <div class="photo-box">
                            <img src="${displayPhoto}" class="td-photo" alt="Flat" 
                                 onerror="this.src='${defaultImg}'; this.onerror=null;">
                        </div>
                    </td>
                    <td><strong>${f.city || '---'}</strong></td>
                    <td>${f.streetName || ''}, ${f.streetNumber || ''}</td>
                    <td>${f.areaSize || 0} m²</td>
                    <td>${f.hasAC ? 'Sim' : 'Não'}</td>
                    <td>${typeof formatDate === 'function' ? formatDate(f.availableDate) : f.availableDate}</td>
                    <td style="font-weight:600;">€${f.rentPrice || 0}</td>
                    <td onclick="event.stopPropagation()">
                        <button class="fav-btn-table" onclick="toggleFavorite(event, '${f.id}')" 
                                style="background:none; border:none; cursor:pointer; font-size:18px;">
                            ❤️
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    
    const originalToggle = window.toggleFavorite;
    window.toggleFavorite = function(e, id) {
        if (originalToggle) originalToggle(e, id);
        renderFavorites(); 
    };
    </script>
</body>
</html>
