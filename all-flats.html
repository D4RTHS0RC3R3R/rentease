<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Flats - RentEase</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="main-header">
        <div class="container header-flex">
            <a href="index.html" class="logo-link">RentEase</a>
            <nav class="main-nav">
                <a href="index.html">Favoritos</a>
                <a href="all-flats.html">Todos os Flats</a>
                <a href="new-flat.html">Novo Flat</a>
                <a href="profile.html">Perfil</a>
            </nav>
            <div class="user-info">
                Olá, <strong id="full-name-header">...</strong>
                <button onclick="logout()"
                    style="background:none; border:1px solid #ddd; padding:5px 12px; border-radius:20px; cursor:pointer;">Sair</button>
            </div>
        </div>
    </header>

    <main class="container">
        <h1>Os meus Apartamentos</h1>
        <div id="all-flats-grid" class="flats-grid"></div>

        <div id="editModal" class="modal">
            <div class="modal-content airbnb-card">
                <span class="close-btn" onclick="closeEditModal()">&times;</span>
                <h2>Editar Apartamento</h2>
                <form id="edit-form" onsubmit="saveEdit(event)">
                    <input type="hidden" id="edit-id">
                    <label>Cidade</label>
                    <input type="text" id="edit-city" required>
                    <label>Preço (€)</label>
                    <input type="number" id="edit-rentPrice" required>
                    <button type="submit" class="btn-primary">Guardar Alterações</button>
                    <button type="button" onclick="deleteFlat()" class="btn-delete-flat">Eliminar Apartamento</button>
                </form>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>

</html>
