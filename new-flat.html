<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anunciar Novo Flat - RentEase</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="main-header">
        <div class="container header-flex">
            <a href="index.html" class="logo-link">RentEase</a>
            <nav class="main-nav">
                <a href="index.html">Favoritos</a>
                <a href="all-flats.html">Todos os Flats</a>
                <a href="new-flat.html">Novo Flat</a>
                <a href="profile.html">Perfil</a>
            </nav>
            <div class="user-info">
                Olá, <strong id="full-name-header">...</strong>
                <button onclick="logout()"
                    style="background:none; border:1px solid #ddd; padding:5px 12px; border-radius:20px; cursor:pointer;">Sair</button>
            </div>
        </div>
    </header>
    </header>

    <main class="container">
        <div class="form-container airbnb-card">
            <h1>Anuncie o seu espaço</h1>
            <p class="subtitle">Insira os detalhes do novo apartamento abaixo.</p>

            <form id="new-flat-form">
                <div class="input-section">
                    <label>Localização</label>
                    <input type="text" id="city" placeholder="Cidade (ex: Lisboa)" required>
                    <div class="input-row">
                        <input type="text" id="streetName" placeholder="Nome da Rua" required>
                        <input type="number" id="streetNumber" placeholder="Nº" required>
                    </div>
                </div>

                <div class="input-section">
                    <label>Características</label>
                    <div class="input-row">
                        <input type="number" id="areaSize" placeholder="Área (m²)" required>
                        <input type="number" id="yearBuilt" placeholder="Ano de Construção" required>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="hasAC">
                        <label for="hasAC">Possui Ar Condicionado?</label>
                    </div>
                </div>

                <div class="input-section">
                    <label>Preço e Disponibilidade</label>
                    <input type="number" id="rentPrice" placeholder="Valor do Aluguel (€)" required>
                    <input type="date" id="dateAvailable" required>
                </div>

                <div class="input-section">
                    <label>Link da Imagem</label>
                    <input type="url" id="photoUrl" placeholder="https://exemplo.com/imagem.jpg">
                    <small style="color: #717171;">Cole o endereço de uma imagem da internet.</small>
                </div>

                <button type="submit" class="btn-primary">Criar Apartamento</button>
            </form>
        </div>
    </main>

    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script>

        document.getElementById('new-flat-form').addEventListener('submit', saveNewFlat);

        function saveNewFlat(event) {
            event.preventDefault();

            const userSession = JSON.parse(localStorage.getItem('user'));

            if (!userSession || !userSession.email) {
                alert("Erro de sessão. Por favor, faça login novamente.");
                window.location.href = 'login.html';
                return;
            }

            const newFlat = {
                id: crypto.randomUUID(),
                ownerEmail: userSession.email,
                city: document.getElementById('city').value,
                streetName: document.getElementById('streetName').value,
                streetNumber: Number(document.getElementById('streetNumber').value),
                areaSize: Number(document.getElementById('areaSize').value),
                hasAC: document.getElementById('hasAC').checked,
                yearBuilt: Number(document.getElementById('yearBuilt').value),
                rentPrice: Number(document.getElementById('rentPrice').value),
                dateAvailable: document.getElementById('dateAvailable').value,
                photoUrl: document.getElementById('photoUrl').value || "",
                isFavourite: false
            };

            allFlats.push(newFlat);

            localStorage.setItem('flats', JSON.stringify(allFlats));

            alert("Apartamento criado com sucesso!");
            window.location.href = 'all-flats.html';
        }
    </script>
</body>

</html>
