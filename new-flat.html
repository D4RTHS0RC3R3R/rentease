<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RentEase - Novo Flat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="form-page">
    <header class="main-header">
        <div class="container header-flex">
            <a href="index.html" class="logo-link">RentEase</a>
            <nav class="main-nav">
                <a href="index.html">Favoritos</a>
                <a href="all-flats.html">Todos os Flats</a>
                <a href="new-flat.html" class="active">Novo Flat</a>
                <a href="profile.html">Perfil</a>
            </nav>
            <div class="user-info">Olá, <strong id="full-name-header">...</strong> <button onclick="logout()" class="btn-logout">Sair</button></div>
        </div>
    </header>

    <main class="container">
        <div class="airbnb-card" style="max-width: 800px;">
            <h1 style="margin-bottom: 10px;">Anunciar Imóvel</h1>
            <p style="color: var(--text-light); margin-bottom: 30px;">Preencha os dados abaixo para publicar o seu anúncio.</p>
            
            <form id="new-flat-form" onsubmit="saveNewFlat(event)">
                <div class="edit-grid">
                    <div class="input-group">
                        <label>Cidade</label>
                        <input type="text" id="city" placeholder="Ex: Lisboa" required>
                    </div>
                    <div class="input-group">
                        <label>Preço (€)</label>
                        <input type="number" id="rentPrice" placeholder="0.00" required>
                    </div>
                </div>

                <div class="edit-grid">
                    <div class="input-group">
                        <label>Rua</label>
                        <input type="text" id="streetName" required>
                    </div>
                    <div class="input-group">
                        <label>Número</label>
                        <input type="number" id="streetNumber" required>
                    </div>
                </div>

                <div class="edit-grid">
                    <div class="input-group">
                        <label>Área (m²)</label>
                        <input type="number" id="areaSize" required>
                    </div>
                    <div class="input-group">
                        <label>Disponível desde</label>
                        <input type="date" id="availableDate" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>URL da Foto (Opcional)</label>
                    <input type="url" id="photoUrl" placeholder="https://...">
                </div>

                <div class="input-group" style="flex-direction: row; align-items: center; gap: 10px; margin-top: 10px;">
                    <input type="checkbox" id="hasAC" style="width: auto; cursor: pointer;">
                    <label for="hasAC" style="text-transform: none; cursor: pointer; font-weight: normal;">Este imóvel tem Ar Condicionado?</label>
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 30px;">Publicar Anúncio</button>
            </form>
        </div>
    </main>

    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script>
        function saveNewFlat(e) {
            e.preventDefault();
            const currentUser = JSON.parse(localStorage.getItem('user'));
            
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            const newFlat = {
                id: Date.now().toString(),
                city: document.getElementById('city').value,
                streetName: document.getElementById('streetName').value,
                streetNumber: document.getElementById('streetNumber').value,
                areaSize: document.getElementById('areaSize').value,
                rentPrice: parseFloat(document.getElementById('rentPrice').value),
                availableDate: document.getElementById('availableDate').value,
                photoUrl: document.getElementById('photoUrl').value || "", // Aceita vazio
                hasAC: document.getElementById('hasAC').checked,
                ownerEmail: currentUser.email // Vincula o imóvel ao utilizador logado
            };

            const flats = JSON.parse(localStorage.getItem('flats')) || [];
            flats.push(newFlat);
            localStorage.setItem('flats', JSON.stringify(flats));
            
            alert('Imóvel publicado com sucesso!');
            window.location.href = 'all-flats.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user && document.getElementById('full-name-header')) {
                document.getElementById('full-name-header').textContent = user.firstName + ' ' + user.lastName;
            }
        });
    </script>
</body>
</html>
